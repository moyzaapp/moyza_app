<div class="bg-white rounded-2xl border border-gray-200 p-6 mb-6">

    <form method="get" action="/report-logs" class="flex flex-wrap gap-4">

        <div class="flex-1 min-w-[200px]">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Estado
            </label>
            <select
                name="status"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-transparent"
            >
                <option value="">Todos</option>
                <option value="pending" {% if selected_status == 'pending' %}selected{% endif %}>
                    ⏳ Pendiente
                </option>
                <option value="success" {% if selected_status == 'success' %}selected{% endif %}>
                    ✅ Exitoso
                </option>
                <option value="failed" {% if selected_status == 'failed' %}selected{% endif %}>
                    ❌ Fallido
                </option>
                <option value="skipped" {% if selected_status == 'skipped' %}selected{% endif %}>
                    ⏭️ Omitido
                </option>
            </select>
        </div>

        <div class="flex-1 min-w-[200px]">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Propiedad
            </label>
            <select
                name="property_id"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-transparent"
            >
                <option value="">Todas</option>
                {% for property in properties %}
                <option value="{{ property.id }}" {% if selected_property_id == property.id %}selected{% endif %}>
                    {{ property.title }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="flex-1 min-w-[150px]">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Límite
            </label>
            <select
                name="limit"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-transparent"
            >
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
            </select>
        </div>

        <div class="flex items-end gap-2">
            <button
                type="submit"
                class="bg-black text-white px-6 py-2 rounded-lg hover:bg-gray-800 transition-colors"
            >
                Filtrar
            </button>

            <a
                href="/report-logs"
                class="bg-gray-100 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors"
            >
                Limpiar
            </a>
        </div>

    </form>

</div>
