<div
    id="reportModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4"
>

    <div class="bg-white rounded-2xl w-full max-w-[600px] max-h-[90vh] overflow-y-auto p-4 sm:p-6 lg:p-8">

        <div class="flex items-center justify-between mb-4 sm:mb-6">

            <h2 class="text-xl sm:text-2xl font-bold">
                Subir Informe
            </h2>

            <button
                onclick="closeModal()"
                class="text-gray-400 hover:text-gray-600 transition-colors text-2xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100"
            >
                ✕
            </button>

        </div>

        <form
            action="/reports/upload"
            method="POST"
            enctype="multipart/form-data"
        >

            <select
                name="property_id"
                class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 mb-3 sm:mb-4 text-sm sm:text-base"
            >

                <option value="">
                    Seleccionar Propiedad
                </option>

                {% for property in properties %}

                <option value="{{ property.id }}">
                    {{ property.title }}
                </option>

                {% endfor %}

            </select>

            <select
                name="report_type"
                class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 mb-3 sm:mb-4 text-sm sm:text-base"
                required
            >
                <option value="">
                    Seleccionar tipo de informe
                </option>

                <option value="GENERAL">
                    General
                </option>

                <option value="SEGUIMIENTO">
                    Seguimiento
                </option>

                <option value="VALORACION">
                    Valoración
                </option>
            </select>

            <textarea
                name="notes"
                placeholder="Observaciones"
                class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 mb-3 sm:mb-4 text-sm sm:text-base"
                rows="3"
            ></textarea>

            <input
                type="file"
                name="report_file"
                class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 mb-3 sm:mb-6 text-sm sm:text-base"
            >

            <div class="mb-3 sm:mb-4 flex items-start gap-2 sm:gap-3">

                <input
                    type="checkbox"
                    id="send_whatsapp"
                    name="send_whatsapp"
                    value="true"
                    class="mt-1 w-4 h-4 sm:w-5 sm:h-5"
                >

                <label for="send_whatsapp" class="text-sm sm:text-base text-gray-700">
                    Enviar automáticamente por WhatsApp
                </label>

            </div>

            <div class="flex flex-col sm:flex-row justify-end gap-2 sm:gap-3">

                <button
                    type="button"
                    onclick="closeModal()"
                    class="w-full sm:w-auto bg-gray-100 hover:bg-gray-200 px-4 sm:px-5 py-2 sm:py-3 rounded-xl transition-colors text-sm sm:text-base"
                >
                    Cancelar
                </button>

                <button
                    class="w-full sm:w-auto bg-black hover:bg-gray-800 text-white px-4 sm:px-5 py-2 sm:py-3 rounded-xl transition-colors text-sm sm:text-base"
                >
                    Subir
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openModal() {

    const modal = document.getElementById("reportModal")

    modal.classList.remove("hidden")

    modal.classList.add("flex")
}

function closeModal() {

    const modal = document.getElementById("reportModal")

    modal.classList.remove("flex")

    modal.classList.add("hidden")
}

</script>
