<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Login
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex items-center justify-center px-4">

        <form
            action="/login"
            method="POST"
            class="bg-white p-6 sm:p-10 rounded-2xl shadow-lg w-full max-w-md"
        >

            <h1 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8 text-center">
                MOYZA
            </h1>

            <input
                type="text"
                name="username"
                placeholder="Correo"
                required
                class="w-full border p-3 rounded-lg mb-4 text-base"
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
                class="w-full border p-3 rounded-lg mb-6 text-base"
            >

            {% if error %}

            <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4">

                {{ error }}

            </div>

            {% endif %}

            <button
                type="submit"
                class="w-full bg-black text-white p-3 rounded-xl text-base font-medium active:bg-gray-800 transition-colors"
            >
                Ingresar
            </button>

        </form>

    </div>

</body>
</html>
