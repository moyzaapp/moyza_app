<div
    id="clientModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center"
>

    <div class="bg-white rounded-2xl w-[500px] p-8">

        <div class="flex items-center justify-between mb-6">

            <h2 class="text-2xl font-bold">
                Nuevo Cliente
            </h2>

            <button onclick="closeModal()">
                ✕
            </button>

        </div>

        <form action="/clients/create" method="post">

            <div class="mb-4">

                <label class="block mb-2 text-sm font-medium">
                    Nombre
                </label>

                <input
                    type="text"
                    name="name"
                    class="w-full border border-gray-300 rounded-xl p-3"
                >

            </div>

            <div class="mb-4">

                <label class="block mb-2 text-sm font-medium">
                    Correo
                </label>

                <input
                    type="text"
                    name="email"
                    class="w-full border border-gray-300 rounded-xl p-3"
                >

            </div>

            <div class="mb-6">

                <label class="block mb-2 text-sm font-medium">
                    Teléfono
                </label>

                <input
                    type="text"
                    name="phone"
                    class="w-full border border-gray-300 rounded-xl p-3"
                >

            </div>

            <div class="flex justify-end gap-3">

                <button
                    type="button"
                    onclick="closeModal()"
                    class="px-5 py-3 rounded-xl bg-gray-100"
                >
                    Cancelar
                </button>

                <button
                    class="px-5 py-3 rounded-xl bg-black text-white"
                >
                    Guardar
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openModal() {

    const modal = document.getElementById("clientModal")

    modal.classList.remove("hidden")
    modal.classList.add("flex")
}

function closeModal() {

    const modal = document.getElementById("clientModal")

    modal.classList.remove("flex")
    modal.classList.add("hidden")
}

</script>
