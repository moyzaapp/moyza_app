<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">

    <!-- Tabla con scroll horizontal en móvil -->
    <div class="overflow-x-auto -mx-px">

    <table class="w-full min-w-[700px]">

        <thead class="bg-gray-50 border-b border-gray-200">

            <tr>

                <th class="px-3 sm:px-6 py-3 sm:py-4 text-left text-xs sm:text-sm font-semibold text-gray-600 whitespace-nowrap">
                    Nombre
                </th>

                <th class="px-3 sm:px-6 py-3 sm:py-4 text-left text-xs sm:text-sm font-semibold text-gray-600 whitespace-nowrap">
                    Correo
                </th>

                <th class="px-3 sm:px-6 py-3 sm:py-4 text-left text-xs sm:text-sm font-semibold text-gray-600 whitespace-nowrap">
                    Teléfono
                </th>

                <th class="px-3 sm:px-6 py-3 sm:py-4 text-left text-xs sm:text-sm font-semibold text-gray-600 whitespace-nowrap">
                    Estado
                </th>

                <th class="px-3 sm:px-6 py-3 sm:py-4 text-right text-xs sm:text-sm font-semibold text-gray-600 whitespace-nowrap">
                    Acciones
                </th>

            </tr>

        </thead>

        <tbody>

            {% for client in clients %}

            <tr class="border-b border-gray-100 hover:bg-gray-50">

                <td class="px-3 sm:px-6 py-3 sm:py-4 text-xs sm:text-sm text-gray-700">
                    {{ client.name }}
                </td>

                <td class="px-3 sm:px-6 py-3 sm:py-4 text-xs sm:text-sm text-gray-700">
                    {{ client.email }}
                </td>

                <td class="px-3 sm:px-6 py-3 sm:py-4 text-xs sm:text-sm text-gray-700 whitespace-nowrap">
                    {{ client.phone }}
                </td>

                <td class="px-3 sm:px-6 py-3 sm:py-4">

                    {% if client.status == 'Activo' %}

                    <span class="bg-green-100 text-green-700 px-2 sm:px-3 py-1 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap">
                        Activo
                    </span>

                    {% else %}

                    <span class="bg-yellow-100 text-yellow-700 px-2 sm:px-3 py-1 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap">
                        Pendiente
                    </span>

                    {% endif %}

                </td>

                <td class="px-3 sm:px-6 py-3 sm:py-4">

                    <div class="flex justify-end gap-1 sm:gap-2 whitespace-nowrap">

                        <button
                            onclick="editClient(
                                '{{ client.id }}',
                                '{{ client.name }}',
                                '{{ client.email }}',
                                '{{ client.phone }}'
                            )"
                            class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-2 sm:px-4 py-2 rounded-lg text-xs sm:text-sm transition-colors inline-flex items-center"
                        >
                            <span class="hidden sm:inline">Editar</span>
                            <svg class="w-4 h-4 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                            </svg>
                        </button>

                        <form
                            action="/clients/delete/{{ client.id }}"
                            method="POST"
                            onsubmit="return confirm('¿Eliminar cliente?')"
                            class="inline-block"
                        >

                            <button
                                class="bg-red-100 hover:bg-red-200 text-red-700 px-2 sm:px-4 py-2 rounded-lg text-xs sm:text-sm transition-colors inline-flex items-center"
                                type="submit"
                            >
                                <span class="hidden sm:inline">Eliminar</span>
                                <svg class="w-4 h-4 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>

                        </form>

                    </div>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

    </div>

</div>
