<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">

    <table class="w-full">

        <thead class="bg-gray-50 border-b border-gray-200">

            <tr>

                <th class="px-6 py-4 text-left">
                    Propiedad
                </th>

                <th class="px-6 py-4 text-left">
                    Cliente
                </th>

                <th class="px-6 py-4 text-left">
                    Agente
                </th>

                <th class="px-6 py-4 text-left">
                    Ciudad
                </th>

                <th class="px-6 py-4 text-left">
                    Valor
                </th>

                <th class="px-6 py-4 text-left">
                    Estado
                </th>

                <th class="px-6 py-4 text-right">
                    Acciones
                </th>

            </tr>

        </thead>

        <tbody>

            {% for property in properties %}

            <tr class="border-b border-gray-100">

                <td class="px-6 py-4">
                    {{ property.title }}
                </td>

                <td class="px-6 py-4">
                    {{ property.client.name }}
                </td>

                <td class="px-6 py-4">
                    {{ property.agent.name }}
                </td>

                <td class="px-6 py-4">
                    {{ property.city }}
                </td>

                <td class="px-6 py-4">
                    $ {{ property.price }}
                </td>

                <td class="px-6 py-4">

                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">
                        {{ property.status }}
                    </span>

                </td>

                <td class="flex justify-end gap-2">

                    <button 
                        onclick="editProperty(
                            '{{ property.id }}',
                            '{{ property.title }}',
                            '{{ property.price }}',
                            '{{ property.client_id }}',
                            '{{ property.city }}',
                            '{{ property.agent_id }}',
                            '{{ property.status }}'
                        )"
                        class="bg-blue-100 px-4 py-2 rounded-lg text-sm text-blue-700"
                    >
                        Editar
                    </button>

                    <form 
                        action="/properties/delete/{{ property.id }}"
                        method="POST"
                        onsubmit="return confirm('¿Estás seguro de eliminar esta propiedad?');"
                    >
                        <button 
                            type="submit" 
                            class="bg-red-100 px-4 py-2 rounded-lg text-sm text-red-700"
                        >
                            Eliminar
                        </button>

                    </form>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>
