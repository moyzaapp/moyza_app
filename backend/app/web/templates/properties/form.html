<div
    id="propertyModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center"
>

    <div class="bg-white rounded-2xl w-[700px] p-8 border border-gray-200">

        <div class="flex items-center justify-between mb-6">

            <h2
                id="modalTitle"
                class="text-2xl font-bold"
            >
                Nueva Propiedad
            </h2>

            <button onclick="closeModal()">
                ✕
            </button>

        </div>

        <form id="propertyForm" action="/properties/create" method="POST">
            <input
                type="hidden"
                name="property_id"
                id="property_id"
            >

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Título
                    </label>

                <input
                    type="text"
                    name="title"
                    placeholder="Título"
                    class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    id="title"
                >

                </div>

                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Ciudad
                    </label>

                <input
                    type="text"
                    name="city"
                    placeholder="Ciudad"
                    class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    id="city"
                >

                </div>

                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Dirección
                    </label>

                <input
                    type="text"
                    name="address"
                    placeholder="Dirección"
                    class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    id="address"
                >

                </div>

                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Valor
                    </label>

                <input
                    type="number"
                    name="price"
                    placeholder="Valor"
                    class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    id="price"
                >

                </div>

                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Cliente
                    </label>

                <select
                    name="client_id"
                    class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    id="client_id"
                >

                    <option value="">
                        Cliente
                    </option>

                    {% for client in clients %}

                    <option value="{{ client.id }}">
                        {{ client.name }}
                    </option>

                    {% endfor %}

                </select>

                </div>

                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Agente
                    </label>

                <select
                    name="agent_id"
                    class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    id="agent_id"
                >

                    <option value="">
                        Agente
                    </option>

                    {% for agent in agents %}

                    <option value="{{ agent.id }}">
                        {{ agent.name }}
                    </option>

                    {% endfor %}

                </select>

                </div>

            </div>

            <textarea
                name="description"
                placeholder="Descripción"
                class="w-full border border-gray-300 rounded-xl p-3 mt-4 focus:outline-none focus:ring-2 focus:ring-gray-200"
            ></textarea>

            <div id="statusContainer" class="mt-4 hidden">

                <label class="block mb-2 text-sm font-medium">
                    Estado
                </label>

                <select
                    id="status"
                    name="status"
                    class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200"
                >
                    <option value="Activa">
                        Activa
                    </option>

                    <option value="Reservada">
                        Reservada
                    </option>

                    <option value="Pausada">
                        Pausada
                    </option>

                    <option value="Vendida">
                        Vendida
                    </option>

                    <option value="Retirada">
                        Retirada
                    </option>

                    <option value="Archivada">
                        Archivada
                    </option>

                </select>

            </div>
            
            <div class="flex justify-end gap-3 mt-6">

                <button
                    type="button"
                    onclick="closeModal()"
                    class="bg-gray-100 px-5 py-3 rounded-xl"
                >
                    Cancelar
                </button>

                <button
                    class="bg-black text-white px-5 py-3 rounded-xl"
                >
                    Guardar
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openModal() {

    const modal = document.getElementById("propertyModal")
    document.getElementById("modalTitle").innerText = "Nueva Propiedad"
    document.getElementById("statusContainer").classList.add("hidden")

    modal.classList.remove("hidden")
    modal.classList.add("flex")
}

function editProperty(id, title, price, client_id, city, agent_id, address, status) {

    openModal()

    document.getElementById("modalTitle").innerText = "Actualizar Propiedad"

    document.getElementById("statusContainer").classList.remove("hidden")

    document.getElementById("property_id").value = id

    document.getElementById("title").value = title

    document.getElementById("price").value = price

    document.getElementById("client_id").value = client_id

    document.getElementById("city").value = city

    document.getElementById("agent_id").value = agent_id

    document.getElementById("address").value = address

    document.getElementById("status").value = status
    
    document.getElementById("propertyForm").action = "/properties/update"
}

function editPropertyFromButton(button) {

    if (!button || !button.dataset) {
        return
    }

    editProperty(
        button.dataset.id,
        button.dataset.title || "",
        button.dataset.price || "",
        button.dataset.clientId || "",
        button.dataset.city || "",
        button.dataset.agentId || "",
        button.dataset.address || "",
        button.dataset.status || "Activa"
    )
}

function closeModal() {

    const modal = document.getElementById("propertyModal")

    modal.classList.remove("flex")
    modal.classList.add("hidden")
}

</script>
