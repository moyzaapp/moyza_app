<header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-4 lg:px-8 sticky top-0 z-30">

    <div class="flex items-center gap-3">

        <!-- Botón hamburger (solo móvil) -->
        <button
            onclick="toggleSidebar()"
            class="lg:hidden p-2 hover:bg-gray-100 rounded-lg transition-colors"
            aria-label="Abrir menú"
        >
            <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <div class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center font-bold flex-shrink-0">
            {{ current_user.full_name[0] }}
        </div>

        <div class="hidden sm:block">
            <p class="font-semibold text-gray-800 text-sm lg:text-base">
                {{ current_user.email }}
            </p>

            <p class="text-xs lg:text-sm text-gray-500">
                {{ current_user.role_id | capitalize }}
            </p>
        </div>

    </div>

    <div class="flex items-center gap-2 lg:gap-4">

        <span class="text-gray-600 hidden md:inline text-sm lg:text-base">
            {{ current_user.full_name }}
        </span>

        <a
            href="/logout"
            class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 lg:px-4 rounded-xl transition-colors text-sm lg:text-base"
        >
            Salir
        </a>

    </div>

</header>
