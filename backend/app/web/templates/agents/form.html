<div
    id="agentModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4"
>

    <div class="bg-white rounded-2xl w-full max-w-[500px] max-h-[90vh] overflow-y-auto p-4 sm:p-6 lg:p-8">

        <div class="flex items-center justify-between mb-4 sm:mb-6">

            <h2 class="text-xl sm:text-2xl font-bold">
                Agente
            </h2>

            <button
                onclick="closeModal()"
                class="text-gray-400 hover:text-gray-600 transition-colors text-2xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100"
            >
                ✕
            </button>

        </div>

        <form
            id="agentForm"
            action="/agents/create"
            method="POST"
        >

            <input
                type="hidden"
                name="agent_id"
                id="agent_id"
            >

            <div class="mb-3 sm:mb-4">

                <label class="block mb-1 sm:mb-2 text-xs sm:text-sm font-medium text-gray-700">
                    Nombre
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm sm:text-base"
                    required
                >

            </div>

            <div class="mb-3 sm:mb-4">

                <label class="block mb-1 sm:mb-2 text-xs sm:text-sm font-medium text-gray-700">
                    Correo
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm sm:text-base"
                    required
                >

            </div>

            <div class="mb-3 sm:mb-4">

                <label class="block mb-1 sm:mb-2 text-xs sm:text-sm font-medium text-gray-700">
                    Teléfono
                </label>

                <input
                    type="text"
                    id="phone"
                    name="phone"
                    class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm sm:text-base"
                >

            </div>

            <div class="mb-4 sm:mb-6">

                <label class="block mb-1 sm:mb-2 text-xs sm:text-sm font-medium text-gray-700">
                    Zona
                </label>

                <input
                    type="text"
                    id="zone"
                    name="zone"
                    class="w-full border border-gray-300 rounded-xl p-2 sm:p-3 focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm sm:text-base"
                >

            </div>

            <div class="flex flex-col sm:flex-row justify-end gap-2 sm:gap-3">

                <button
                    type="button"
                    onclick="closeModal()"
                    class="w-full sm:w-auto px-4 sm:px-5 py-2 sm:py-3 rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors text-sm sm:text-base"
                >
                    Cancelar
                </button>

                <button
                    type="submit"
                    class="w-full sm:w-auto px-4 sm:px-5 py-2 sm:py-3 rounded-xl bg-black hover:bg-gray-800 text-white transition-colors text-sm sm:text-base"
                >
                    Guardar
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openModal() {

    document.getElementById("agentForm").reset()

    document.getElementById("agentForm")
        .action = "/agents/create"

    document.getElementById("agent_id").value = ""

    const modal = document.getElementById("agentModal")

    modal.classList.remove("hidden")
    modal.classList.add("flex")
}


function editAgent(id, name, email, phone, zone) {

    openModal()

    document.getElementById("agent_id").value = id

    document.getElementById("name").value = name

    document.getElementById("email").value = email

    document.getElementById("phone").value = phone

    document.getElementById("zone").value = zone

    document.getElementById("agentForm")
        .action = "/agents/update"
}


function closeModal() {

    const modal = document.getElementById("agentModal")

    modal.classList.remove("flex")
    modal.classList.add("hidden")
}

</script>
