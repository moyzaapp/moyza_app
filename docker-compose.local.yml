version: "3.8"

services:

  db:
    image: postgres:16
    container_name: moyza_db

    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: moyza

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: moyza_backend

    build:
      context: ./backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    depends_on:
      db:
        condition: service_healthy
